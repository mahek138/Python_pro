<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#c2185b">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
    <title>Spark Women</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .logo-text {
            font-family: 'Great Vibes', cursive;
            color: #6221A3;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .illustration-container {
            margin: 40px 0;
        }

        .illustration-container img {
            width: 100%;
            max-width: 280px;
            height: auto;
        }

        .tagline {
            font-size: 1.1rem;
            color: #000;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .btn-get-started {
            background-color: #6200EE;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            letter-spacing: 1px;
        }

        .btn-get-started:active {
            background-color: #4b00c7;
        }
    </style>

</head>
<body>
    <div class="container">
        <h1 class="logo-text">Spark Women</h1>
        
        <div class="illustration-container">
            <img src="family.png" alt="Family Illustration">
        </div>

        <p class="tagline">Safety fits like a glove ; Try one on</p>
 
        <button class="btn-get-started">GET STARTED</button>
    </div>
    <script src="/static/pwa.js"></script>
</body>
</html>
