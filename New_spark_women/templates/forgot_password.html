<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#c2185b">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
    <title>Forgot Password - Spark Women</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fff5f8 0%, #f3f7ff 100%);
        }

        .card {
            width: 92%;
            max-width: 420px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 30px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: #333;
        }

        p {
            color: #666;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            background: #5b4bdb;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-size: 15px;
            cursor: pointer;
        }

        .error {
            color: #d32f2f;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .success {
            color: #2e7d32;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .dev-link {
            background: #f3f5ff;
            border: 1px solid #d8ddff;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 12px;
            font-size: 13px;
            word-break: break-all;
            text-align: left;
        }

        a {
            color: #5b4bdb;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Forgot Password</h1>
        {% if error_message %}
            <p class="error">{{ error_message }}</p>
        {% endif %}
        {% if success_message %}
            <p class="success">{{ success_message }}</p>
        {% endif %}
        {% if reset_link %}
            <div class="dev-link">
                Development reset link: <a href="{{ reset_link }}">{{ reset_link }}</a>
            </div>
        {% endif %}

        <form action="{{ url_for('forgot_password_page') }}" method="POST">
            <div class="input-group">
                <input type="email" name="email" placeholder="Enter your registered email" required>
            </div>
            <button class="btn" type="submit">Submit</button>
        </form>
        <p><a href="{{ url_for('home') }}">Back to Login</a></p>
    </div>
    <script src="/static/pwa.js"></script>
</body>
</html>
